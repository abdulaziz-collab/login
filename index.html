<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | page.com</title>
    <style>
        /* 1. Umumiy sozlamalar */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
            overflow: hidden;
            padding: 20px; /* Mobil qurilmalarda chetlari yopishib qolmasligi uchun */
        }

        /* 2. Orqa fondagi harakatlanuvchi doiralar */
        .background-blobs {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .blob {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            filter: blur(30px);
            border-radius: 50%;
            animation: move 10s infinite alternate ease-in-out;
        }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(50px, 50px) scale(1.2); }
        }

        /* 3. Login kartasi dizayni - RESPONSIVE */
        .login-box {
            position: relative;
            width: 100%;
            max-width: 400px; /* Kompyuterda maksimal kenglik */
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            color: white;
            opacity: 0;
            transform: translateY(-50px);
            animation: fadeIn 1s forwards ease-out;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: 2px;
            font-size: 24px;
        }

        /* 4. Inputlar dizayni */
        .input-group {
            position: relative;
            margin-bottom: 30px;
        }

        .input-group input {
            width: 100%;
            padding: 10px 0;
            font-size: 16px;
            color: #fff;
            border: none;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            outline: none;
            background: transparent;
            transition: 0.5s;
        }

        .input-group label {
            position: absolute;
            top: 10px;
            left: 0;
            pointer-events: none;
            transition: 0.5s;
            color: rgba(255, 255, 255, 0.5);
        }

        .input-group input:focus~label,
        .input-group input:valid~label {
            top: -20px;
            left: 0;
            color: #03e9f4;
            font-size: 12px;
        }

        .input-group input:focus {
            border-bottom: 2px solid #03e9f4;
        }

        /* 5. Neon Tugma */
        button {
            width: 100%;
            padding: 12px 20px;
            background: transparent;
            color: #03e9f4;
            border: 2px solid #03e9f4;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 4px;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.5s;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            background: #03e9f4;
            color: #050801;
            box-shadow: 0 0 10px #03e9f4, 0 0 30px #03e9f4;
        }

        button:active {
            transform: scale(0.98);
        }

        /* 6. Xatolik xabari */
        #message {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
            min-height: 20px;
        }

        .error {
            color: #ff4d4d;
            animation: shake 0.3s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* 7. MEDIA QUERIES (Moslashuvchanlik) */
        
        /* Planshetlar uchun */
        @media (max-width: 768px) {
            .login-box {
                padding: 35px;
                max-width: 350px;
            }
        }

        /* Telefonlar uchun */
        @media (max-width: 480px) {
            .login-box {
                padding: 25px;
                border-radius: 15px;
            }

            h2 {
                font-size: 20px;
                margin-bottom: 20px;
            }

            button {
                letter-spacing: 2px;
                padding: 10px;
            }

            .blob {
                width: 150px !important;
                height: 150px !important;
            }
        }
    </style>
</head>

<body>

    <div class="background-blobs">
        <div class="blob" style="width: 200px; height: 200px; top: 10%; left: 10%;"></div>
        <div class="blob" style="width: 300px; height: 300px; bottom: 10%; right: 10%; animation-delay: -2s;"></div>
    </div>

    <div class="login-box">
        <h2>KIRISH</h2>
        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="username" required>
                <label>Foydalanuvchi nomi</label>
            </div>
            <div class="input-group">
                <input type="password" id="password" required>
                <label>Parol</label>
            </div>
            <button type="submit">Yuborish</button>
        </form>
        <div id="message"></div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const message = document.getElementById('message');

        form.addEventListener('submit', (e) => {
            e.preventDefault();

            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // Oddiy validatsiya
            if (user === "admin" && pass === "12345") {
                message.style.color = "#00ff00";
                message.innerText = "Muvaffaqiyatli kirildi!";
                form.style.filter = "blur(1px)";
                setTimeout(() => {
                    alert("Xush kelibsiz, " + user + "!");
                }, 300);
            } else {
                message.innerText = "Login yoki parol xato!";
                message.className = "error";

                setTimeout(() => {
                    message.innerText = "";
                    message.className = "";
                }, 2500);
            }
        });
    </script>
</body>

</html>
